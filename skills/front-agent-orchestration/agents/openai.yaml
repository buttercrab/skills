interface:
  display_name: "Front Agent Orchestration"
  short_description: "Gateway agent protocol for humans and main agents"
  default_prompt: "Open two sessions in the same project/root. Use $front-agent-orchestration main for the non-human-facing CEO-style orchestrator; main should conserve tokens, give the human the printed tokenless gateway command, run one-shot listen after pairing, and delegate detailed exploration/implementation/verification to subagents whenever available. Use the printed $front-agent-orchestration gateway MAIN_ID command for the human-facing intent-discovery agent; gateway should spend tokens to understand the human and repo, fail fast if main wait-ready is not live, pair before sending work, announce readiness to the human, avoid foreground listen when human input is pending, drain pending main mail with listen --timeout 0 at human-turn boundaries, inspect relevant docs/code/tests for nontrivial requests, clarify human intent from product/behavior/technical/UX/testing/scope perspectives, show a repo-grounded plain-language intent preview for approval, and send only compact confirmed private work, answer, or note YAML packets with human_confirmed: true when gateway originates them. Human talks only to gateway after setup. Use one-shot listen as the notification boundary, do not run competing listeners, use long 24h waits by default, and stop after terminal completion/failure/cancellation unless the human approves more work."
